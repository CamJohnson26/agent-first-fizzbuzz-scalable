# fly.toml app configuration file generated for agent-first-fizzbuzz-lean

app = "agent-first-fizzbuzz-lean"
primary_region = "sea"

[http_service]
  internal_port = 3002
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[build]
  dockerfile = "Dockerfile"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
