version: '3.8'

services:
  web-server:
    build:
      context: .
      dockerfile: apps/web-server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    networks:
      - fizzbuzz-network

  web-dashboard:
    build:
      context: .
      dockerfile: apps/web-dashboard/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - web-server
    networks:
      - fizzbuzz-network

networks:
  fizzbuzz-network:
    driver: bridge
