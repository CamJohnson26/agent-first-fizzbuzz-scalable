# fly.toml app configuration file for consolidated agent-first-fizzbuzz

app = "agent-first-fizzbuzz-scalable"
primary_region = "sjc"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 2
  processes = ["app"]

[build]
  dockerfile = "Dockerfile.monolith"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
