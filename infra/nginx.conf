events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Backend Services
    upstream web_server {
        server 127.0.0.1:3000;
    }

    upstream analytics_service {
        server 127.0.0.1:3001;
    }

    upstream lean_service {
        server 127.0.0.1:3002;
    }

    server {
        listen       8080;
        server_name  localhost;

        # Web Dashboard (must be before /)
        location /dashboard/ {
            alias /usr/share/nginx/html/dashboard/;
            index index.html;
            try_files $uri $uri/ /dashboard/index.html;
        }

        # Marketing Landing Page
        location / {
            root /usr/share/nginx/html/marketing;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # API Proxies
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://web_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /analytics/ {
            rewrite ^/analytics/(.*)$ /$1 break;
            proxy_pass http://analytics_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /lean/ {
            rewrite ^/lean/(.*)$ /$1 break;
            proxy_pass http://lean_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check for the machine itself
        location /health {
            return 200 '{"status":"ok","service":"monolith"}';
            add_header Content-Type application/json;
        }
    }
}
