name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.14.1'
        cache: 'pnpm'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

    - name: Install elan (Lean 4)
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Security Check (pnpm audit)
      run: pnpm audit --audit-level high || echo "pnpm audit failed (legacy endpoint retired), relying on Trivy"

    - name: Security Check (Trivy FS)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: Run Lint
      run: pnpm run lint

    - name: Install Playwright Browsers
      run: pnpm --filter @fizzbuzz/e2e exec playwright install --with-deps

    - name: Run Build
      run: pnpm run build

    - name: Run Tests
      run: pnpm run test

    - name: Debug dist
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: ls -R ./apps/marketing-landing-page/dist

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./apps/marketing-landing-page/dist
