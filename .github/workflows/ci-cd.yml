name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9.0.0

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '25.9.0'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Security Check (pnpm audit)
      run: pnpm audit --audit-level high

    - name: Security Check (Trivy FS)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: Run Lint
      run: pnpm run lint

    - name: Run Build
      run: pnpm run build

    - name: Run Tests
      run: pnpm run test

    - name: Debug dist
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      run: ls -R ./apps/marketing-landing-page/dist

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/master' && github.event_name == 'push'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./apps/marketing-landing-page/dist
